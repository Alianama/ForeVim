version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# ForeVim — Production Docker Compose
# Prometheus sudah jalan eksternal di: http://192.168.9.16:9090
# Jalankan: docker compose up -d --build
# ──────────────────────────────────────────────────────────────────────────────

networks:
  forevim-net:
    driver: bridge

volumes:
  postgres_data:

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: forevim
      POSTGRES_PASSWORD: forevim
      POSTGRES_DB: forevim
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - forevim-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forevim"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override supaya pakai Prometheus eksternal & DB container
      DATABASE_URL: postgresql+asyncpg://forevim:forevim@postgres:5432/forevim
      PROMETHEUS_URL: http://192.168.9.16:9090
      ALLOWED_ORIGINS: "http://localhost:3000,http://192.168.9.16:3000,http://192.168.9.16:8000"
    ports:
      - "8000:8000"
    networks:
      - forevim-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Frontend Dashboard ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Browser mengakses backend dari mesin user — pakai IP/localhost
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    networks:
      - forevim-net
    depends_on:
      backend:
        condition: service_healthy
